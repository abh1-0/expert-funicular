<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Forgot PIN</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(circle at top,#2457ff 0,#07152f 44%,#040812 100%);color:#eef5ff;padding:16px}.wrap{max-width:760px;margin:auto}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.brand{display:flex;align-items:center;gap:12px;font-weight:1000}.logo{width:52px;height:52px;border-radius:18px;background:linear-gradient(135deg,#fff,#c7d7ff);color:#1538b0;display:grid;place-items:center;font-size:28px}.card{background:#ffffff12;border:1px solid #ffffff24;border-radius:30px;padding:20px;box-shadow:0 25px 70px #0009;backdrop-filter:blur(18px);animation:fade .38s cubic-bezier(.22,1,.36,1)}h1,h2,h3{margin:0 0 10px}.muted,p{color:#bdcafa;line-height:1.45}.input,select{width:100%;border:1px solid #ffffff25;background:#ffffff14;color:#fff;border-radius:18px;padding:15px;margin:8px 0;font-size:16px;outline:none}.btn{width:100%;border:0;border-radius:18px;padding:15px;margin-top:10px;font-weight:1000;font-size:16px;background:linear-gradient(135deg,#fff,#dbe7ff);color:#1237a8;box-shadow:0 14px 30px #0005;transition:transform .35s cubic-bezier(.22,1,.36,1),box-shadow .35s cubic-bezier(.22,1,.36,1),filter .35s cubic-bezier(.22,1,.36,1)}.btn.sec{background:#ffffff14;color:#fff;border:1px solid #ffffff25;box-shadow:none}.btn:active{transform:scale(.97);filter:brightness(1.08)}.status{background:#ffffff12;border:1px solid #ffffff22;border-radius:20px;padding:14px;margin:10px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.hidden{display:none}.steps{display:flex;gap:8px;margin:14px 0}.step{height:8px;flex:1;border-radius:99px;background:#ffffff18}.step.on{background:#fff}.pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:320px;margin:12px auto}.pad button{height:58px;border-radius:18px;border:1px solid #ffffff25;background:#ffffff12;color:#fff;font-size:20px;font-weight:900;box-shadow:inset 0 1px 0 #ffffff20,0 10px 22px #0004;transition:transform .32s cubic-bezier(.22,1,.36,1),background .32s cubic-bezier(.22,1,.36,1),box-shadow .32s cubic-bezier(.22,1,.36,1)}.pad button:active{transform:scale(.91);background:#ffffff25;box-shadow:inset 0 1px 0 #ffffff35,0 4px 12px #0007}.padPop{animation:padPop .28s cubic-bezier(.22,1,.36,1)}.dotPop{animation:dotPop .22s cubic-bezier(.22,1,.36,1)}.dots{text-align:center;font-size:28px;letter-spacing:8px;margin:12px;transition:transform .22s cubic-bezier(.22,1,.36,1)}.loader{height:8px;border-radius:999px;background:#ffffff18;overflow:hidden}.bar{height:100%;width:35%;background:linear-gradient(90deg,#fff,#58e08a);border-radius:999px;animation:load 1s infinite}.receipt{background:#ffffff12;border:1px solid #ffffff22;border-radius:22px;padding:14px}.r{display:flex;justify-content:space-between;border-bottom:1px dashed #ffffff25;padding:10px 0;gap:10px}.r:last-child{border-bottom:0}.ok{color:#b7ffce}.bad{color:#ffb4b4}.big{font-size:64px;text-align:center}.mini{font-size:13px}@keyframes load{from{transform:translateX(-120%)}to{transform:translateX(330%)}}@keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}@keyframes padPop{from{opacity:0;transform:scale(.86) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}@keyframes dotPop{0%{transform:scale(.92)}60%{transform:scale(1.08)}100%{transform:scale(1)}}@media(max-width:720px){.grid{grid-template-columns:1fr}.card{border-radius:24px}}
</style>
</head>
<body>
<div class="wrap">
 <div class="top"><div class="brand"><div class="logo">P</div><div>Pluxee Bank<br><span class="muted mini">PIN Recovery</span></div></div><button class="btn sec" style="width:auto" onclick="location.href='index.html'">Back</button></div>
 <section class="card">
  <h1>Forgot Payments PIN</h1>
  <p>Reset your 4-digit Payments PIN after account and identity verification. Do not enter real banking details on shared or unknown pages.</p>
  <div class="steps"><div id="s1" class="step on"></div><div id="s2" class="step"></div><div id="s3" class="step"></div><div id="s4" class="step"></div></div>
  <div id="app"></div>
 </section>
</div>
<script>
const $=id=>document.getElementById(id);
let state={user:"",mobile:"",email:"",network:"Visa",last4:"",pin1:"",pin2:""};
const ref=()=> "PIN"+Math.floor(100000+Math.random()*900000);
const now=()=>new Date().toLocaleString("en-IN");
function steps(n){[1,2,3,4].forEach(i=>$("s"+i).classList.toggle("on",i<=n))}
function renderStart(){steps(1);$("app").innerHTML=`<h2>Account Check</h2><div class="status">Enter User ID, linked mobile number, linked email, debit card last 4 digits and card network.</div><input id="uid" class="input" placeholder="User ID"><input id="mob" class="input" inputmode="numeric" placeholder="Linked mobile number"><input id="mail" class="input" type="email" placeholder="Linked email address"><div class="grid"><input id="last4" class="input" inputmode="numeric" maxlength="4" placeholder="Last 4 digits of debit card"><select id="network"><option>Visa</option><option>Mastercard</option><option>RuPay</option><option>American Express</option></select></div><button class="btn" onclick="checkAccount()">Continue</button>`}
function checkAccount(){let uid=$("uid").value.trim(),mob=$("mob").value.trim(),mail=$("mail").value.trim(),l4=$("last4").value.trim();if(!uid||!mob||!mail||l4.length!==4)return alert("Fill all details. Card last 4 must be 4 digits.");state.user=uid;state.mobile=mob;state.email=mail;state.last4=l4;state.network=$("network").value;loading("Checking Account",renderKyc)}
function renderKyc(){steps(2);$("app").innerHTML=`<h2>Mini-KYC</h2><div class="status"><b>What you need to do:</b><br>1. Select ID type.<br>2. Enter name as per account records.<br>3. Enter DOB and ID number.<br>4. Submit for verification.</div><div class="status">Details provided are matched with account records. If mismatched, PIN reset will be declined.</div><select id="idType"><option>School Identity Card</option><option>Aadhaar Card</option><option>Passport</option><option>Birth Certificate</option></select><input id="name" class="input" placeholder="Full name"><input id="dob" class="input" type="date"><input id="idno" class="input" placeholder="ID number"><button class="btn" onclick="verifyKyc()">Verify Identity</button><button class="btn sec" onclick="renderStart()">Back</button>`}
function verifyKyc(){let name=$("name").value.trim().toLowerCase(),dob=$("dob").value,idno=$("idno").value.trim();if(!name||!dob||!idno)return alert("Fill all KYC details.");let ok=name==="aarnav"&&idno==="233316";loading("Verifying Identity",()=> ok?renderPin1():declined())}
function renderPin1(){steps(3);state.pin1="";$("app").innerHTML=`<h2>Set New PIN</h2><div class="status">Enter a new 4-digit Payments PIN.</div><div id="dots" class="dots">----</div><div id="pad" class="pad"></div><button class="btn sec" onclick="renderKyc()">Back</button>`;makePad(v=>{state.pin1=v;if(v.length===4)setTimeout(renderPin2,250)})}
function renderPin2(){state.pin2="";$("app").innerHTML=`<h2>Confirm New PIN</h2><div class="status">Re-enter the same 4-digit PIN to confirm.</div><div id="dots" class="dots">----</div><div id="pad" class="pad"></div><button class="btn sec" onclick="renderPin1()">Change PIN</button>`;makePad(v=>{state.pin2=v;if(v.length===4)setTimeout(()=>{state.pin1===state.pin2?loading("Updating PIN",success):pinMismatch()},250)})}
function makePad(cb){let val="",pad=$("pad"),dots=$("dots");pad.innerHTML="";[1,2,3,4,5,6,7,8,9,"Clear",0,"Back"].forEach((x,i)=>{let b=document.createElement("button");b.type="button";b.textContent=x;b.className="padPop";b.style.animationDelay=(i*25)+"ms";b.onclick=()=>{if(x==="Clear")val="";else if(x==="Back")val=val.slice(0,-1);else if(val.length<4)val+=String(x);dots.textContent="•".repeat(val.length)+"-".repeat(4-val.length);dots.classList.remove("dotPop");void dots.offsetWidth;dots.classList.add("dotPop");cb(val)};pad.appendChild(b)})}
function pinMismatch(){$("app").innerHTML=`<h2>PIN Mismatch</h2><div class="status bad">The two PIN entries did not match.</div><button class="btn" onclick="renderPin1()">Try Again</button>`}
function declined(){$("app").innerHTML=`<h2>Verification Declined</h2><div class="status bad">The details provided do not match the account records.</div><button class="btn" onclick="renderKyc()">Try Again</button><button class="btn sec" onclick="location.href='index.html'">Back to Login</button>`}
function success(){steps(4);let r=ref();$("app").innerHTML=`<div class="big ok">✓</div><h2>PIN Reset Successful</h2><div class="receipt"><div class="r"><span>Status</span><b class="ok">Successful</b></div><div class="r"><span>Reference ID</span><b>${r}</b></div><div class="r"><span>User ID</span><b>${state.user}</b></div><div class="r"><span>Card Network</span><b>${state.network}</b></div><div class="r"><span>Card Ending</span><b>•••• ${state.last4}</b></div><div class="r"><span>Date & Time</span><b>${now()}</b></div></div><button class="btn" onclick="location.href='index.html'">Return to Login</button><div class="status">Redirecting to login in 5 seconds...</div>`;setTimeout(()=>location.href="index.html",5000)}
function loading(text,next){$("app").innerHTML=`<h2>${text}</h2><p>Please wait while the request is processed.</p><div class="loader"><div class="bar"></div></div>`;setTimeout(next,1400)}
renderStart();
</script>
</body>
</html>
