<!doctype html>

<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Pluxee Bank" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Dashboard - Pluxee Bank</title>
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:radial-gradient(circle at top,#2147d8 0,#08152f 42%,#050914 100%);color:#eaf1ff}.app{max-width:1100px;margin:auto;padding:14px}.top{position:sticky;top:0;z-index:5;background:rgba(5,9,20,.82);backdrop-filter:blur(18px);border-bottom:1px solid rgba(255,255,255,.12)}.topin{max-width:1100px;margin:auto;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;gap:10px}.logo{width:44px;height:44px;border-radius:16px;background:linear-gradient(135deg,#fff,#b9ccff);color:#1237a8;display:grid;place-items:center;font-size:24px;font-weight:1000}.brand{display:flex;align-items:center;gap:10px}.brand b{font-size:18px}.brand small{display:block;color:#b9c8ef}.pill{border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.1);border-radius:999px;color:#eaf1ff;padding:10px 12px;font-weight:900}.card{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);box-shadow:0 25px 70px #0008;border-radius:28px;padding:18px;margin:14px 0;backdrop-filter:blur(18px)}.hero{background:linear-gradient(135deg,rgba(255,255,255,.16),rgba(255,255,255,.07))}.bal{font-size:36px;font-weight:1000;margin:8px 0}.muted{color:#b9c8ef}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px}.tile{background:rgba(0,0,0,.22);border:1px solid rgba(255,255,255,.12);border-radius:22px;padding:15px}.tile h3{margin:0 0 8px}.nav{display:flex;gap:8px;overflow:auto;padding:10px 0}.nav button{white-space:nowrap;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.1);color:#eaf1ff;border-radius:999px;padding:11px 14px;font-weight:1000}.nav button.on{background:#fff;color:#1237a8}.page{display:none}.page.on{display:block}.input,select,textarea{width:100%;border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.12);color:#fff;border-radius:16px;padding:14px;font-size:16px;margin:7px 0 12px;outline:none}.input::placeholder,textarea::placeholder{color:#93a4cc}select option{color:#111827}.btn{width:100%;border:0;border-radius:17px;padding:14px;margin-top:8px;font-size:15px;font-weight:1000;background:linear-gradient(135deg,#fff,#dbe7ff);color:#1237a8;box-shadow:0 14px 30px #0005}.sec{background:rgba(255,255,255,.12);color:#eaf1ff;border:1px solid rgba(255,255,255,.16);box-shadow:none}.danger{background:#dc2626;color:white}.ok{color:#b7ffce;font-weight:1000}.bad{color:#ffb4b4;font-weight:1000}.status{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:12px;color:#cbd8ff;font-size:14px;margin:8px 0}.cardpic{height:190px;border-radius:24px;background:linear-gradient(135deg,#111827,#2563eb,#7c3aed);padding:18px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 18px 40px #0008;position:relative;overflow:hidden}.chip{position:absolute;right:22px;top:58px;width:46px;height:34px;border-radius:8px;background:linear-gradient(135deg,#f8e7a0,#b88922);box-shadow:inset 0 0 0 2px #8a651a}.chip:before,.chip:after{content:'';position:absolute;left:0;right:0;border-top:1px solid #8a651a}.chip:before{top:11px}.chip:after{top:22px}.editrow{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.readonly{opacity:.65;filter:grayscale(.35);pointer-events:none}.iconbtn{width:auto;border-radius:14px;padding:12px 14px}.dashgrid{display:grid;grid-template-columns:1.4fr 1fr;gap:12px}.balanceBox{background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:16px}.miniStat{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}.miniStat div{background:rgba(255,255,255,.08);border-radius:16px;padding:10px;font-size:13px}.pad{max-width:310px;margin:12px auto 0}.pad button{min-height:58px;margin:0!important;padding:0!important;border-radius:18px;transition:.12s transform,.12s background,.18s box-shadow}.pad button:active{transform:scale(.94);background:rgba(255,255,255,.25);box-shadow:0 0 0 5px rgba(255,255,255,.08)}.successHero{text-align:center}.bigTick{width:82px;height:82px;border-radius:50%;margin:8px auto 14px;background:rgba(34,197,94,.18);border:1px solid rgba(183,255,206,.45);display:grid;place-items:center;font-size:46px;color:#b7ffce;animation:pop .32s ease}.receipt{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:12px;margin:12px 0}.rline{display:flex;justify-content:space-between;gap:12px;border-bottom:1px dashed rgba(255,255,255,.14);padding:9px 0}.rline:last-child{border-bottom:0}.fadeIn{animation:fade .42s cubic-bezier(.2,.8,.2,1)}.slideIn{animation:slide .48s cubic-bezier(.22,1,.36,1)}.btn,.tile,.card,.sheet,.nav button{transition:transform .42s cubic-bezier(.22,1,.36,1),background .42s cubic-bezier(.22,1,.36,1),box-shadow .42s cubic-bezier(.22,1,.36,1),opacity .42s cubic-bezier(.22,1,.36,1)}.btn:active,.nav button:active{transform:scale(.965)}@keyframes pop{0%{transform:scale(.6);opacity:0}100%{transform:scale(1);opacity:1}}@keyframes fade{from{opacity:0}to{opacity:1}}@keyframes slide{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}.cardpic.blocked{filter:grayscale(1);opacity:.55}.tx{display:grid;grid-template-columns:1fr auto;gap:8px;padding:12px;border-bottom:1px solid rgba(255,255,255,.1)}.modal{display:none;position:fixed;inset:0;background:#000a;z-index:50;align-items:flex-end;justify-content:center}.sheet{background:#08152f;color:#eaf1ff;border:1px solid rgba(255,255,255,.16);border-radius:28px 28px 0 0;max-width:430px;width:100%;padding:22px;max-height:92vh;overflow:auto}.spinner{width:50px;height:50px;border:6px solid rgba(255,255,255,.2);border-top-color:white;border-radius:50%;animation:s 1s linear infinite;margin:18px auto}@keyframes s{to{rotate:360deg}}.qr{width:150px;height:150px;background:repeating-linear-gradient(45deg,#fff 0 8px,#111 8px 16px);border:12px solid #fff;border-radius:12px;margin:auto}.hidden{display:none!important}@media(min-width:760px){.modal{align-items:center}.sheet{border-radius:28px}.btn{width:auto;padding-left:18px;padding-right:18px}.actions .btn,.tile .btn{width:100%}}
  </style>
</head>
<body>
<header class="top"><div class="topin"><div class="brand"><div class="logo">P</div><div><b>Pluxee Bank</b><small>Internet Banking Dashboard</small></div></div><button class="pill" onclick="location.href='index.html'">Logout</button></div></header>
<main class="app">
<section class="card hero"><div class="dashgrid"><div class="balanceBox"><div class="muted">Available Balance</div><div id="balance" class="bal">Rs 1,250</div><div class="miniStat"><div>Account<br><b>Student Savings</b></div><div>UPI<br><b>aarnav@pluxee</b></div><div>Daily Limit<br><b>Rs 10,000</b></div><div>Card<br><b id="cardStateTop">Active</b></div></div></div><div class="balanceBox"><div class="muted">This Month</div><h2 style="margin:8px 0">Spending Summary</h2><div class="status">Payments: Rs 0<br>Orders: Rs 0<br>Failed: 0</div><button class="btn sec" onclick="show('history')">View History</button></div></div></section>
<nav id="nav" class="nav"></nav>
<div id="pages"></div>
</main>
<div id="modal" class="modal"><div id="sheet" class="sheet"></div></div>
<script>
const $=id=>document.getElementById(id);let bal=1250,cardBlocked=false,cardOrdered=false,deliveryStage=0;let tx=[];let approvals=[{name:'Roblox - App Store',amt:50,detail:'Robux purchase approval'}];const stages=['Ordered','Dispatched','Out For Delivery','Delivered','Activated'];const tabs={home:'🏠 Home',pay:'💸 Payments',products:'🧾 Products',cards:'💳 Cards',delivery:'📦 Delivery',account:'👤 Account',permissions:'🔐 Permissions',ipad:'📱 iPad',history:'📜 History'};
function money(n){return 'Rs '+Number(n).toLocaleString('en-IN')}function id(){return 'PX'+Date.now().toString().slice(-7)}function now(){return new Date().toLocaleString('en-IN')}function addTx(title,amt,status,extra){tx.unshift({id:id(),time:now(),title,amt,status,extra});renderTx();renderBalance()}
function modal(h){$('sheet').innerHTML=h;$('modal').style.display='flex'}function closeModal(){$('modal').style.display='none'}function load(title,done){modal(`<h2>${title}</h2><div class="spinner"></div><div id="load" class="status">Connecting to secure server...</div>`);let s=['Validating PIN...','Checking available balance...','Processing request...','Generating receipt...'],i=0,t=setInterval(()=>{if(i<s.length)$('load').textContent=s[i++];else{clearInterval(t);done()}},350)}
function pin(title,desc,done){modal(`<h2>${title}</h2><div class="status">${desc}</div><div class="status">Enter Payments PIN using the secure keypad below.</div><div style="text-align:center;font-size:30px;font-weight:1000;letter-spacing:10px;margin:12px 0" id="pdots">----</div><input id="pin" class="hidden" readonly><div class="pad" style="display:grid;grid-template-columns:repeat(3,1fr);gap:9px" id="pinpad"></div><button class="btn" id="go">Continue</button><button class="btn sec" onclick="closeModal()">Cancel</button>`);let vals=[1,2,3,4,5,6,7,8,9,'Clear',0,'Back'];$('pinpad').innerHTML=vals.map(v=>`<button class="btn sec" type="button" data-k="${v}">${v}</button>`).join('');$('pinpad').onclick=e=>{let v=e.target.dataset.k;if(!v)return;if(v==='Clear')$('pin').value='';else if(v==='Back')$('pin').value=$('pin').value.slice(0,-1);else if($('pin').value.length<4)$('pin').value+=v;$('pdots').textContent='•'.repeat($('pin').value.length)+'-'.repeat(4-$('pin').value.length)};$('go').onclick=()=>{if($('pin').value.length!==4)return alert('Enter 4 digit PIN');load(title,done)}}
function success(title,body){let rid=id();modal(`<div class="successHero slideIn"><div class="bigTick">✓</div><h2>${title}</h2><div class="muted">Your request has been processed securely.</div></div><div class="receipt"><div class="rline"><span>Status</span><b class="ok">Successful</b></div><div class="rline"><span>Reference ID</span><b>${rid}</b></div><div class="rline"><span>Date & Time</span><b>${now()}</b></div><div class="rline"><span>Details</span><span>${body}</span></div></div><button class="btn" onclick="closeModal();renderAll()">Done</button><button class="btn sec" onclick="show('history');closeModal();renderAll()">View History</button>`)}
function pay(title,amt,extra){amt=Number(amt);if(cardBlocked&&title.includes('Card'))return modal('<h2>Card Blocked</h2><div class="status bad">This card is blocked.</div><button class="btn" onclick="closeModal()">OK</button>');if(amt>bal){addTx(title,money(amt),'Failed','Insufficient Balance');return modal(`<h2>Transaction Failed</h2><div class="status bad">Insufficient Balance</div><button class="btn" onclick="closeModal();renderAll()">OK</button>`)}pin(title,'Amount: '+money(amt),()=>{bal-=amt;let tid=id();addTx(title,money(amt),'Successful',extra||'');success('Payment Successful',`<b>${title}</b><br>Amount: ${money(amt)}<br>Transaction ID: ${tid}<br>${extra||''}`)})}
function renderBalance(){$('balance').textContent=money(bal)}
function pageHome(){return `<section class="page on" id="home"><div class="grid"><div class="tile"><h3>Quick Pay</h3><button class="btn" onclick="show('pay')">UPI / Bank Transfer</button><button class="btn sec" onclick="show('products')">Bills & Products</button></div><div class="tile"><h3>Card Status</h3><div id="miniCard"></div><button class="btn sec" onclick="show('cards')">Manage Card</button></div><div class="tile"><h3>Pending Approvals</h3><div id="approvalsBox"></div></div></div></section>`}
function pagePay(){return `<section class="page" id="pay"><div class="grid"><div class="tile"><h3>UPI Transfer</h3><input id="upiTo" class="input" placeholder="UPI ID"><input id="upiAmt" class="input" inputmode="numeric" placeholder="Amount"><textarea id="upiNote" class="input" placeholder="Note"></textarea><button class="btn" onclick="pay('UPI Transfer to '+$('upiTo').value,$('upiAmt').value,$('upiNote').value)">Pay UPI</button></div><div class="tile"><h3>Bank Account Transfer</h3><select id="bank"><option>SBI</option><option>HDFC Bank</option><option>ICICI Bank</option><option>Axis Bank</option><option>Kotak Mahindra Bank</option><option>Punjab National Bank</option><option>Canara Bank</option><option>Bank of Baroda</option><option>Union Bank</option><option>IDFC FIRST Bank</option></select><input id="acc" class="input" placeholder="Account number"><input id="ifsc" class="input" placeholder="IFSC"><input id="bankAmt" class="input" inputmode="numeric" placeholder="Amount"><button class="btn" onclick="pay('Bank Transfer - '+$('bank').value,$('bankAmt').value,'Account: '+$('acc').value)">Transfer</button></div><div class="tile"><h3>Receive Money</h3><div class="qr"></div><div class="status">UPI ID: aarnav@pluxee<br>Show this QR to receive money.</div></div></div></section>`}
function pageProducts(){return `<section class="page" id="products"><div class="grid"><div class="tile"><h3>Mobile Recharge</h3><select id="carrier"><option>Jio</option><option>Airtel</option><option>Vi</option><option>BSNL</option><option>MTNL</option></select><input id="mobile" class="input" placeholder="Mobile number"><select id="rech"><option value="199">Jio/Airtel Starter - Rs 199</option><option value="299">Unlimited Voice - Rs 299</option><option value="399">Daily Data Plus - Rs 399</option><option value="666">Long Validity - Rs 666</option></select><button class="btn" onclick="pay('Mobile Recharge - '+$('carrier').value,$('rech').value,'Mobile: '+$('mobile').value)">Recharge</button></div><div class="tile"><h3>Metro Ticket</h3><select id="from"><option>Miyapur</option><option>Ameerpet</option><option>LB Nagar</option><option>Dilsukhnagar</option><option>MG Bus Station</option><option>Raidurg</option><option>Secunderabad East</option><option>Nagole</option></select><select id="to"><option>Ameerpet</option><option>LB Nagar</option><option>Dilsukhnagar</option><option>MG Bus Station</option><option>Raidurg</option><option>Secunderabad East</option><option>Nagole</option><option>Miyapur</option></select><select id="metroAmt"><option value="30">Single - Rs 30</option><option value="60">Return - Rs 60</option><option value="100">Day Pass - Rs 100</option></select><button class="btn" onclick="metro()">Book Ticket</button></div><div class="tile"><h3>Roblox Payment</h3><input id="rbxUser" class="input" placeholder="Roblox username"><button class="btn sec" onclick="robloxLogin()">Sign in with Roblox</button><select id="rbx"><option value="50">40 Robux - Rs 50</option><option value="100">80 Robux - Rs 100</option><option value="500">400 Robux - Rs 500</option><option value="1000">800 Robux - Rs 1000</option></select><button class="btn" onclick="robloxPay()">Verify & Process</button><div id="rbxMsg" class="status">Roblox username verification required.</div></div></div></section>`}
function metro(){let amt=$('metroAmt').value;pay('Metro Ticket',amt,'Route: '+$('from').value+' to '+$('to').value+'<br>Scan this QR Code at the Entrance and Exit Gates')}
function robloxLogin(){modal(`<h2>Roblox Sign In</h2><input id="ruser" class="input" placeholder="Roblox username"><input id="rpass" class="input" type="password" placeholder="Roblox password"><button class="btn" id="rgo">Verify Roblox Account</button><button class="btn sec" onclick="closeModal()">Cancel</button>`);$('rgo').onclick=()=>{load('Verifying Roblox Account',()=>{closeModal();if($('rbxMsg'))$('rbxMsg').innerHTML='<b class=ok>Username verified.</b><br>Checking Roblox Plus eligibility...'})}}
function robloxPay(){let user=$('rbxUser').value.trim();if(!user)return alert('Enter Roblox username');load('Checking Roblox Plus',()=>{addTx('Roblox Payment Attempt','Rs '+$('rbx').value,'Failed','Roblox ID: '+user+' • Roblox Plus not active');modal(`<h2>Roblox Payment Not Available</h2><div class="status bad">This Roblox user does not have Roblox Plus enabled, so Robux cannot be sent directly through the Internet Banking portal.</div><button class="btn" onclick="closeModal();renderAll()">OK</button>`)})}
function pageCards(){return `<section class="page" id="cards"><div class="grid"><div class="tile"><h3>Active Card</h3><div id="cardpic"></div><button class="btn danger" onclick="blockCard()">Block Card</button><button class="btn sec" onclick="unblockCard()">Unblock Card</button></div><div class="tile"><h3>Order New Debit Card</h3><select id="net"><option value="120">RuPay Classic - Rs 120</option><option value="180">Visa Classic - Rs 180</option><option value="220">Mastercard Standard - Rs 220</option><option value="250">Discover Student - Rs 250</option></select><button class="btn sec" id="reasonBtn" onclick="chooseCardReason()">Select Reason</button><input id="reason" class="hidden" value=""><div id="reasonText" class="status">Reason required before ordering.</div><select id="del"><option value="0">Branch pickup - Rs 0</option><option value="40">Registered address - Rs 40</option><option value="90">Express delivery - Rs 90</option></select><textarea id="addr" class="input" placeholder="Delivery address / pickup branch"></textarea><button class="btn" onclick="orderCard()">Order Card</button></div><div class="tile"><h3>Activate New Card</h3><input id="cardno" class="input" placeholder="Full card number"><input id="exp" class="input" placeholder="MM/YY"><button class="btn" onclick="pin('Activate Card','OTP will be verified.',()=>{addTx('New card activated','-','Successful','Card ending '+$('cardno').value.slice(-4));modal('<h2>Card Activated</h2><div class=status>New card activated successfully.</div><button class=btn onclick=closeModal()>Done</button>')})">Activate</button></div></div></section>`}
function cardHTML(){return `<div class="cardpic ${cardBlocked?'blocked':''}"><div>PLUXEE BANK</div><div class="chip"></div><div style="font-size:22px;font-weight:1000">•••• •••• •••• 2017</div><div>${cardBlocked?'BLOCKED':'ACTIVE'} • AARNAV</div></div>`}
function blockCard(){pin('Block Card','Card will be blocked immediately.',()=>{cardBlocked=true;addTx('Debit card blocked','-','Successful','Immediate action');success('Card Blocked','Debit card blocked successfully.<br>Status: Blocked')})}function unblockCard(){pin('Unblock Card','Card will be unblocked immediately.',()=>{cardBlocked=false;addTx('Debit card unblocked','-','Successful','Immediate action');success('Card Unblocked','Debit card unblocked successfully.<br>Status: Active')})}
function chooseCardReason(){modal(`<h2>Select Card Order Reason</h2><button class="btn sec" onclick="setReason('New card issue',0)">New card issue - Rs 0</button><button class="btn sec" onclick="setReason('Damaged card replacement',80)">Damaged card replacement - Rs 80</button><button class="btn sec" onclick="setReason('Lost card replacement',150)">Lost card replacement - Rs 150</button><button class="btn sec" onclick="setReason('Network upgrade request',60)">Network upgrade request - Rs 60</button><button class="btn" onclick="closeModal()">Close</button>`)}
function setReason(txt,fee){$('reason').value=fee;$('reasonText').innerHTML='<b>'+txt+'</b><br>Reason charge: '+money(fee);closeModal()}
function orderCard(){if($('reason').value==='')return alert('Select card order reason');let fee=Number($('net').value)+Number($('reason').value)+Number($('del').value);if(!$('addr').value)return alert('Enter address / pickup branch');pay('New Debit Card Order',fee,'Delivery: '+$('addr').value+'<br>Reason charge included');cardOrdered=true;deliveryStage=0}
function pageDelivery(){return `<section class="page" id="delivery"><div class="grid"><div class="tile"><h3>Debit Card Delivery</h3><div class="status">${cardOrdered?'Current stage: '+stages[deliveryStage]:'No active card delivery.'}</div><button class="btn" onclick="advanceDelivery()">Refresh Delivery Status</button></div><div class="tile"><h3>Cheque Book</h3><select id="chq"><option value="50">10 leaves - Rs 50</option><option value="90">25 leaves - Rs 90</option><option value="150">50 leaves - Rs 150</option></select><input id="chqAddr" class="input" placeholder="Address / branch"><button class="btn" onclick="pay('Cheque Book Order',$('chq').value,'Delivery: '+$('chqAddr').value)">Order</button></div><div class="tile"><h3>Passbook / Statement</h3><select id="paper"><option value="60">Duplicate Passbook - Rs 60</option><option value="20">1 Month Statement - Rs 20</option><option value="70">6 Month Statement - Rs 70</option></select><input id="paperAddr" class="input" placeholder="Address / branch"><button class="btn" onclick="pay('Paper Service Order',$('paper').value,'Delivery: '+$('paperAddr').value)">Order</button></div></div></section>`}
function advanceDelivery(){if(!cardOrdered)return alert('No delivery to track');if(deliveryStage<stages.length-1)deliveryStage++;addTx('Delivery status updated','-','Updated',stages[deliveryStage]);renderAll()}
function pageAccount(){return `<section class="page" id="account"><div class="grid"><div class="tile"><h3>Contact Details</h3><div class="editrow"><input id="accPhone" class="input readonly" value="••••••2017" readonly><button class="btn sec iconbtn" onclick="editField('accPhone')">✎</button></div><div class="editrow"><input id="accEmail" class="input readonly" value="aarnav@example.com" readonly><button class="btn sec iconbtn" onclick="editField('accEmail')">✎</button></div><button class="btn" onclick="pin('Update Contact Details','Identity re-verification may be required.',()=>{addTx('Contact details update','-','Pending Verification','Phone/email change');success('Update Submitted','Contact details update submitted.<br>Status: Pending identity verification')})">Submit Contact Update</button></div><div class="tile"><h3>Branch Change</h3><div class="status">Change of branch without changing account number. Identity re-verification required.</div><select id="branch"><option>Dilsukhnagar Branch</option><option>Malakpet Branch</option><option>Ameerpet Branch</option><option>Hitech City Branch</option><option>Secunderabad Branch</option></select><textarea id="branchReason" class="input" placeholder="Reason for branch change"></textarea><button class="btn" onclick="pin('Branch Change Request','Account number will remain same. Identity re-verification required.',()=>{addTx('Branch change request','-','Pending Verification',$('branch').value);success('Branch Change Submitted','Requested branch: '+$('branch').value+'<br>Account number will remain unchanged.<br>Status: Pending identity verification')})">Request Branch Change</button></div><div class="tile"><h3>Account Options</h3><button class="btn sec" onclick="pin('Download Account Statement','Statement will be generated.',()=>{addTx('Statement generated','-','Successful','Account statement');success('Statement Generated','Account statement generated successfully.')})">Generate Statement</button><button class="btn sec" onclick="pin('Change UPI ID','UPI change request will be submitted.',()=>{addTx('UPI ID change request','-','Pending Approval','UPI change');success('UPI Change Submitted','UPI ID change request submitted for approval.')})">Change UPI ID</button><button class="btn sec" onclick="pin('Nominee Update','Nominee update requires verification.',()=>{addTx('Nominee update','-','Pending Verification','Nominee details');success('Nominee Update Submitted','Nominee update request submitted.')})">Update Nominee</button></div></div></section>`}
function editField(id){$(id).readOnly=false;$(id).classList.remove('readonly');$(id).focus()}
function pagePermissions(){return `<section class="page" id="permissions"><div class="grid"><div class="tile"><h3>Internet Banking Level</h3><select id="lvl"><option>View Only</option><option>Payments Basic</option><option>Payments Plus</option><option>Merchant + QR Enabled</option></select><textarea id="why" class="input" placeholder="Reason for more permissions"></textarea><button class="btn" onclick="pin('Permission Request',$('lvl').value,()=>{addTx('Internet banking permission request','-','Pending Approval',$('why').value);closeModal();renderAll()})">Request Permission</button></div><div class="tile"><h3>Payment Controls</h3><label><input type="checkbox" checked> UPI transfers</label><br><label><input type="checkbox" checked> Bank transfers</label><br><label><input type="checkbox" checked> Merchant payments</label><br><label><input type="checkbox"> International payments</label><button class="btn sec" onclick="pin('Save Permissions','Permission settings will be updated.',()=>{addTx('Permission settings updated','-','Successful','Controls saved');closeModal();renderAll()})">Save</button></div></div></section>`}
function pageIpad(){return `<section class="page" id="ipad"><div class="grid"><div class="tile"><h3>iPad Info</h3><input id="iname" class="input" placeholder="Device name"><input id="iserial" class="input" placeholder="Serial number"><input id="imodel" class="input" placeholder="Model"><input id="iosver" class="input" placeholder="iPadOS version"><input id="storage" class="input" placeholder="Storage, e.g. 64GB / 256GB"><input id="wifi" class="input" placeholder="Wi‑Fi / Cellular IMEI if any"><select id="itrust"><option>Login only</option><option>Login + QRscan</option><option>Payments + approvals</option></select><button class="btn" onclick="pin('Register iPad',$('imodel').value,()=>{addTx('iPad registered','-','Successful',$('iserial').value+' • '+$('iosver').value);closeModal();renderAll()})">Register / Change iPad</button></div><div class="tile"><h3>iPad Permissions</h3><label><input type="checkbox" checked> QRscan payments</label><br><label><input type="checkbox" checked> Push notifications</label><br><label><input type="checkbox"> Device biometric approval</label><br><label><input type="checkbox" checked> App purchase approvals</label><br><label><input type="checkbox"> International merchant prompts</label><button class="btn sec" onclick="pin('Update iPad Permissions','Device permissions will be saved.',()=>{addTx('iPad permissions updated','-','Successful','Saved');closeModal();renderAll()})">Update</button></div></div></section>`}
function pageHistory(){return `<section class="page" id="history"><div class="card"><h2>Transaction History</h2><div id="txList"></div></div></section>`}
function renderTx(){let el=$('txList');if(!el)return;el.innerHTML=tx.length?tx.map((t,i)=>`<div class="tx"><div><b>${t.title}</b><br><span class="muted">${t.time}<br>ID: ${t.id}<br>${t.extra||''}</span>${/verification|pending/i.test(t.status)?`<button class="btn sec" onclick="miniKyc(${i})">Complete mini-KYC</button>`:''}</div><div><b>${t.amt}</b><br><span class="${t.status==='Failed'?'bad':/verification|pending/i.test(t.status)?'bad':'ok'}">${t.status}</span></div></div>`).join(''):'<div class="status">No transactions yet.</div>'}
function build(){ $('nav').innerHTML=Object.entries(tabs).map(([k,v])=>`<button id="n_${k}" onclick="show('${k}')">${v}</button>`).join(''); $('pages').innerHTML=pageHome()+pagePay()+pageProducts()+pageCards()+pageDelivery()+pageAccount()+pagePermissions()+pageIpad()+pageHistory(); show('home'); addTx('Opening balance','Rs 1,250','Successful','Session started')}
function show(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));$(id).classList.add('on');$(id).classList.add('fadeIn');setTimeout(()=>$(id).classList.remove('fadeIn'),260);document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('on'));$('n_'+id).classList.add('on');renderAll()}
let sx=0,sy=0,swipeBlocked=false;document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;swipeBlocked=!!e.target.closest('.nav')},{passive:true});document.addEventListener('touchend',e=>{if(swipeBlocked)return;let dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;if(Math.abs(dx)<80||Math.abs(dy)>45)return;let keys=Object.keys(tabs),cur=keys.findIndex(k=>$(k).classList.contains('on'));let next=dx<0?cur+1:cur-1;if(next>=0&&next<keys.length)show(keys[next])},{passive:true});
function renderApprovals(){let box=$('approvalsBox');if(!box)return;box.innerHTML=approvals.length?approvals.map((a,i)=>`<div class="status"><b>${a.name}</b><br>${a.detail}<br>Amount: ${money(a.amt)}<button class="btn" onclick="approveReq(${i})">Accept</button><button class="btn sec" onclick="declineReq(${i})">Decline</button></div>`).join(''):'<div class="status ok">No pending approvals.</div>'}
function approveReq(i){let a=approvals[i];pay('Payment Approval - '+a.name,a.amt,'Approval accepted');approvals.splice(i,1);renderApprovals()}
function declineReq(i){let a=approvals[i];addTx('Payment Approval - '+a.name,money(a.amt),'Declined','User declined');approvals.splice(i,1);renderAll()}
async function startMiniCam(){try{let s=await navigator.mediaDevices.getUserMedia({video:true,audio:false});$('mkVideo').srcObject=s;$('mkVideo').classList.remove('hidden');$('mkCamMsg').innerHTML='<b class=ok>Camera ready.</b> Place ID inside frame and tap Capture.'}catch(e){$('mkCamMsg').innerHTML='<b class=bad>Camera permission unavailable.</b><br>Open from HTTPS/Safari/Chrome and allow camera.'}}
function captureMiniPhoto(){let v=$('mkVideo'),c=$('mkCanvas');if(!v||v.classList.contains('hidden'))return alert('Start camera first');c.width=v.videoWidth||320;c.height=v.videoHeight||220;c.getContext('2d').drawImage(v,0,0,c.width,c.height);c.classList.remove('hidden');$('mkCamMsg').innerHTML='<b class=ok>ID photo captured.</b>'}
function miniKyc(i){let t=tx[i];modal(`<h2>Mini-KYC Verification</h2><div class="status">Transaction: <b>${t.title}</b><br>ID: ${t.id}<br>Status: ${t.status}</div><label>ID Type</label><select id="mkType"><option>School Identity Card</option><option>Aadhaar Card</option><option>Passport</option><option>Birth Certificate</option></select><input id="mkName" class="input" placeholder="Full name as per ID"><input id="mkDob" class="input" type="date"><input id="mkNo" class="input" placeholder="ID number"><button class="btn sec" onclick="startMiniCam()">Allow Camera</button><video id="mkVideo" class="hidden" autoplay playsinline style="width:100%;border-radius:18px;background:#000"></video><button class="btn sec" onclick="captureMiniPhoto()">Capture ID Photo</button><canvas id="mkCanvas" class="hidden" style="width:100%;border-radius:18px;background:#000"></canvas><div id="mkCamMsg" class="status">Camera not started.</div><button class="btn" onclick="submitMiniKyc(${i})">Verify Identity</button><button class="btn sec" onclick="closeModal()">Cancel</button>`)}
function submitMiniKyc(i){if(!$('mkName').value||!$('mkDob').value||!$('mkNo').value||$('mkCanvas').classList.contains('hidden'))return alert('Complete ID details and capture ID photo');load('Verifying Identity',()=>{tx[i].status='Successful';tx[i].extra=(tx[i].extra||'')+'<br>Mini-KYC verified: '+$('mkType').value;success('Identity Verified','Mini-KYC completed for transaction '+tx[i].id+'<br>Status updated to Successful')})}
function renderAll(){renderBalance();if($('cardStateTop'))$('cardStateTop').textContent=cardBlocked?'Blocked':'Active';if($('miniCard'))$('miniCard').innerHTML=cardHTML();if($('cardpic'))$('cardpic').innerHTML=cardHTML();renderApprovals();renderTx()}
$('modal').onclick=e=>{if(e.target.id==='modal')closeModal()};build();
</script>
</body>
</html>
