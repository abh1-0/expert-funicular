<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pluxee Bank</title><style> *{box-sizing:border-box}body{margin:0;font-family:system-ui,Arial;background:#eaf1ff;color:#111827}.dark{background:#07111f;color:#e5eefc}.top{background:linear-gradient(90deg,#06163b,#1d4ed8,#6d28d9);color:#fff;padding:14px;position:sticky;top:0;z-index:5}.brand{font-size:24px;font-weight:1000}.wrap{max-width:1100px;margin:auto;padding:12px}.card,.tile{background:#fff;border:1px solid #d7e0f2;border-radius:20px;padding:16px;margin:10px 0;box-shadow:0 8px 24px #0001}.dark .card,.dark .tile,.dark .box{background:#0f172a;color:#e5eefc;border-color:#334155}.hero{background:linear-gradient(135deg,#06163b,#1d4ed8);color:#fff}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}.layout{display:grid;grid-template-columns:220px 1fr;gap:12px}.nav{background:#0f1b3d;border-radius:18px;padding:10px;height:max-content;position:sticky;top:76px}.nav button{width:100%;text-align:left;margin:4px 0;background:transparent;color:#dbeafe;border:1px solid #334155;border-radius:12px;padding:11px;font-weight:850}.nav button.on{background:#2454df}.input,select,textarea{width:100%;padding:13px;border:1px solid #b9c5da;border-radius:14px;margin:7px 0 12px;font-size:16px;background:#fff}.dark .input,.dark select,.dark textarea{background:#111827;color:#e5eefc;border-color:#475569}.btn{border:0;border-radius:14px;background:#2454df;color:#fff;font-weight:950;padding:12px 15px;cursor:pointer;margin:4px}.sec{background:#e5e7eb!important;color:#111827!important}.danger{background:#dc2626!important}.hidden{display:none!important}.money{font-size:34px;font-weight:1000}.help,.status{font-size:13px;background:#f1f5f9;border:1px solid #dbe3ef;border-radius:14px;padding:10px;margin:8px 0;color:#475569}.dark .help,.dark .status{background:#111827;color:#cbd5e1;border-color:#334155}.ok{color:#16a34a;font-weight:950}.bad{color:#dc2626;font-weight:950}.tbl{width:100%;border-collapse:collapse;min-width:760px}.tbl th,.tbl td{padding:9px;border-bottom:1px solid #e5e7eb;text-align:left;font-size:13px}.tableWrap{overflow:auto}.modal{display:none;position:fixed;inset:0;background:#0009;z-index:50;align-items:center;justify-content:center;padding:14px}.box{background:#fff;border-radius:22px;max-width:560px;width:100%;padding:20px;max-height:92vh;overflow:auto}.pinpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:8px 0}.pinpad button{padding:16px;border:1px solid #cbd5e1;border-radius:14px;background:#f8fafc;font-weight:950;font-size:18px}.dots{text-align:center;font-size:28px;letter-spacing:8px}.spinner{width:54px;height:54px;border:6px solid #dbeafe;border-top-color:#2454df;border-radius:50%;animation:s 1s linear infinite;margin:18px auto}@keyframes s{to{rotate:360deg}}.fakecard{border-radius:22px;padding:18px;background:linear-gradient(135deg,#111827,#2563eb);color:white;min-height:170px}.fakecard.blocked{filter:grayscale(1);opacity:.38}.qr{width:150px;height:150px;margin:12px auto;background:white;border:9px solid #111827;border-radius:14px;display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:8px}.qr span{background:#111827}.qr .l{background:white}.bottom,.mobileSel{display:none}.receiptLine{display:flex;justify-content:space-between;border-bottom:1px dashed #cbd5e1;padding:7px 0;gap:8px}.stage{display:flex;gap:10px;align-items:center}.stage b{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;background:#dbeafe;color:#1d4ed8}.stage.done b{background:#dcfce7;color:#15803d}@media(max-width:850px){.layout{display:block}.nav{display:none}.mobileSel{display:block}.grid{grid-template-columns:1fr}.btn{width:100%;margin-top:6px}.modal{align-items:flex-end;padding:0}.box{border-radius:24px 24px 0 0}.bottom{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;position:sticky;bottom:0;background:white;border-top:1px solid #d8e0ef;padding:7px;z-index:30}.bottom button{font-size:11px;border:0;border-radius:11px;padding:8px 3px;background:#f8fbff;font-weight:850}} </style></head><body><div class=top><div class=brand>🏦 PLUXEE BANK</div><div>Internet Banking • Student Digital Account</div></div>

<div id=login class=card style="max-width:480px;margin:22px auto"><button id=dark class="btn sec">Toggle Dark Mode</button><h2>🔐 Login</h2><div class=help>Enter user ID and use the keypad for Payments PIN.</div><input id=uid class=input placeholder="User ID"><div id=loginDots class=dots>----</div><input id=loginPin class=hidden readonly><div id=loginPad class=pinpad></div><button id=loginBtn class=btn>Login</button><button id=openAcct class="btn sec">Open New Account</button><div class=status><h3>📄 Track Request</h3><input id=preRef class=input placeholder="Reference number"><button id=preTrack class="btn sec">Track Request</button></div><p id=err class=bad></p></div>
<main id=acct class="wrap hidden"><div class="card hero"><h2>📝 Account Opening</h2></div><div id=acctBody></div><div class=card><button id=prev class="btn sec">Previous</button><button id=next class=btn>Verify Section & Continue</button><button id=submit class="btn hidden">Final Submit</button><button id=back class="btn sec">Back</button><div id=acctMsg class=status>Start application.</div></div></main>
<main id=app class="wrap hidden"><div class="card hero"><h2>Welcome 👋</h2><p>UPI: aarnav@pluxee</p><div class=grid><div class=tile><div id=balTop class=money></div><p>Available Balance</p></div><div class=tile><b>🛡️ Security</b><p class=ok>Active</p></div><div class=tile><b>📨 Approvals</b><p>3 pending</p></div></div></div><select id=mobileSel class="input mobileSel"></select><div class=layout><nav id=nav class=nav></nav><div id=pages></div></div></main><div id=bottom class="bottom hidden"></div><div id=modal class=modal><div id=box class=box></div></div>
<script>
(function(){var USER='aarnav',PIN='2017',bal=1250,tx=[],sec=0,cardRequested=false,cardStage=0,cardBlocked=false;var approvals=[['Roblox - Apple App Store','Rs 50 payment approval'],['iPad QR Permission','Enable QRscan payments'],['Digital Store Purchase','Rs 99 approval']];var menu={dash:'🏠 Home',pay:'💸 Pay',products:'🧾 Products',cards:'💳 Cards',delivery:'📦 Delivery',limits:'📊 Limits',history:'📜 History',identity:'🪪 ID',approvals:'📨 Approvals',more:'⚙️ More'};var sections=['Applicant','Identity','Banking','Cards','iPad','Submit'];
function $(id){return document.getElementById(id)}function all(s){return document.querySelectorAll(s)}function on(id,ev,fn){var e=$(id);if(e)e.addEventListener(ev,fn)}function hide(id){$(id).classList.add('hidden')}function showEl(id){$(id).classList.remove('hidden')}function money(n){return 'Rs '+Number(n).toLocaleString('en-IN')}function tid(){return 'PB'+Date.now().toString().slice(-9)}function modal(html){$('box').innerHTML=html;$('modal').style.display='flex'}function close(){ $('modal').style.display='none'}function msg(t){modal('<h2 class=bad>Action Needed</h2><p>'+t+'</p><button id=ok class=btn>OK</button>')}function qr(){var s='';for(var i=0;i<49;i++)s+='<span class="'+([2,4,8,10,16,18,22,24,26,30,32,36,38,40,44].indexOf(i)>-1?'l':'')+'"></span>';return '<div class=qr>'+s+'</div>'}
function makePad(padId,inputId,dotId){var p=$(padId),inp=$(inputId),dot=$(dotId);if(!p)return;inp.value='';dot.textContent='----';p.innerHTML='';[1,2,3,4,5,6,7,8,9,'Clear',0,'Back'].forEach(function(x){var b=document.createElement('button');b.type='button';b.textContent=x;b.onclick=function(){if(x==='Clear')inp.value='';else if(x==='Back')inp.value=inp.value.slice(0,-1);else if(inp.value.length<4)inp.value+=String(x);dot.textContent='*'.repeat(inp.value.length)+'-'.repeat(4-inp.value.length)};p.appendChild(b)})}
function init(){makePad('loginPad','loginPin','loginDots');build();wire();addTx('Security Login','Login successful','Security','-','Successful',{});render()}function wire(){on('dark','click',function(){document.body.classList.toggle('dark')});on('loginBtn','click',login);on('openAcct','click',function(){hide('login');showEl('acct');drawAcct()});on('back','click',function(){hide('acct');showEl('login')});on('prev','click',function(){if(sec>0){sec--;drawAcct()}});on('next','click',function(){verify(function(){if(sec<sections.length-1){sec++;drawAcct()}})});on('submit','click',function(){verify(function(){$('acctMsg').innerHTML='<b class=ok>Application submitted.</b><br>Ref: PBAO'+Date.now().toString().slice(-6)})});on('preTrack','click',preTrack);document.body.addEventListener('click',globalClick)}function login(){if($('uid').value.trim().toLowerCase()===USER&&$('loginPin').value===PIN){hide('login');showEl('app');showEl('bottom');render()}else $('err').textContent='Invalid User ID or Payments PIN'}
function build(){var keys=Object.keys(menu);$('nav').innerHTML=keys.map(function(k,i){return '<button data-go="'+k+'" class="'+(i?'':'on')+'">'+menu[k]+'</button>'}).join('')+'<button id=logout>🚪 Logout</button>';$('mobileSel').innerHTML=keys.map(function(k){return '<option value="'+k+'">'+menu[k]+'</option>'}).join('');$('bottom').innerHTML=['dash','pay','products','cards','delivery'].map(function(k){return '<button data-go="'+k+'">'+menu[k]+'</button>'}).join('');$('pages').innerHTML=pages()}
function pages(){return dash()+payPage()+products()+cards()+delivery()+limits()+history()+identity()+approvalsPage()+more()}function dash(){return '<section id=dash class="page card"><h2>🏠 Dashboard</h2><div class=help>Tip: payments reduce balance instantly, service actions create receipts, and every completed action appears in transaction history.</div><div class=grid><div class=tile><h3>Quick Actions</h3><button data-go=pay class="btn sec">Send Money</button><button data-go=products class="btn sec">Products</button><button data-go=cards class="btn sec">Cards</button><button data-go=delivery class="btn sec">Delivery</button></div><div class=tile><h3>Balance</h3><div id=balDash class=money></div></div></div><h3>Recent Activity</h3><div class=tableWrap><table id=dashTbl class=tbl></table></div></section>'}
function payPage(){var banks=['State Bank of India','HDFC Bank','ICICI Bank','Axis Bank','Kotak Mahindra Bank','PNB','Bank of Baroda','Canara Bank','Union Bank','Indian Bank','IDFC FIRST','Yes Bank','Federal Bank'].map(function(b){return '<option>'+b+'</option>'}).join('');return '<section id=pay class="page card hidden"><h2>💸 Payments</h2><div class=grid><div class=tile><h3>UPI</h3><input id=upiId class=input placeholder="Receiver UPI ID"><input id=upiName class=input placeholder="Receiver name"><input id=upiAmt class=input type=number placeholder=Amount><button id=upiPay class=btn>Pay UPI</button></div><div class=tile><h3>Bank Transfer</h3><select id=bankName>'+banks+'</select><input id=ben class=input placeholder=Beneficiary><input id=acc1 class=input placeholder="Account number"><input id=acc2 class=input placeholder="Re-enter account number"><input id=ifsc class=input placeholder=IFSC><input id=bankAmt class=input type=number placeholder=Amount><button id=bankPay class=btn>Transfer</button></div><div class=tile><h3>Merchant</h3><input id=mer class=input placeholder=Merchant><input id=merUpi class=input placeholder="Merchant UPI"><input id=merAmt class=input type=number placeholder=Amount><button id=merPay class=btn>Pay Merchant</button></div></div></section>'}
function products(){return '<section id=products class="page card hidden"><h2>🧾 Products</h2><div class=grid><div class=tile><h3>🚇 Metro Ticket</h3><select id=from><option>Dilsukhnagar</option><option>Ameerpet</option><option>Hitec City</option></select><select id=to><option>Raidurg</option><option>MGBS</option><option>LB Nagar</option></select><input id=metroAmt class=input type=number value=40><button id=metroPay class=btn>Buy Ticket</button></div><div class=tile><h3>📶 Mobile Recharge</h3><input id=mobNo class=input placeholder=Mobile><select id=carrier><option>Jio</option><option>Airtel</option><option>Vi</option><option>BSNL</option></select><select id=plan><option value=199>Rs 199</option><option value=299>Rs 299</option><option value=349>Rs 349</option></select><button id=mobPay class=btn>Recharge</button></div><div class=tile><h3>🎮 Robux</h3><input id=rbUser class=input placeholder="Roblox username"><select id=pack><option value=50>40 Robux - Rs 50</option><option value=100>80 Robux - Rs 100</option><option value=500>400 Robux - Rs 500</option></select><button id=rbPay class=btn>Process</button></div></div></section>'}
function cards(){return '<section id=cards class="page card hidden"><h2>💳 Cards</h2><div class=help>Manage active card status, order a new card, activate delivered cards, and track delivery stages.</div><div id=cardVisual class=tile></div><div class=grid><div class=tile><h3>Order New Card</h3><select id=cardNet><option>RuPay Classic</option><option>Visa Classic</option><option>Mastercard Standard</option><option>Discover Student</option></select><select id=cardReason><option>New card required</option><option>Damaged card</option><option>Lost card</option><option>Upgrade card</option></select><input id=cardName class=input placeholder="Name on card" value=AARNAV><select id=cardDelivery><option>Registered address</option><option>Branch pickup</option><option>Express delivery</option></select><label><input id=cOnline type=checkbox checked> Online payments</label><br><label><input id=cTap type=checkbox checked> Tap to pay</label><br><label><input id=cIntl type=checkbox> International payments</label><button id=newCard class=btn>Order New Card</button><div id=cardMsg class=status>No card order yet.</div></div><div class=tile><h3>Card Controls</h3><button id=blockCard class="btn danger">Block Card</button><button id=unblockCard class="btn sec">Unblock Card</button><button id=activateCard class=btn>Activate New Card</button><button id=trackCard class="btn sec">Track Delivery</button></div></div></section>'}
function delivery(){return '<section id=delivery class="page card hidden"><h2>📦 Delivery & Paper Services</h2><div class=help>Track and manage physical delivery for card, cheque book, passbook, and paper statement. Delivery charges are deducted only after PIN confirmation.</div><div class=grid><div class=tile><h3>💳 Card Delivery</h3><p>Delivery timeline: Ordered → Dispatched → Out For Delivery → Delivered → Activated</p><button id=trackCard2 class="btn sec">Track Card Delivery</button><button id=cardReissue class=btn>Reissue Debit Card - Rs 150</button><div id=cardReissueMsg class=status>No card reissue order.</div></div><div class=tile><h3>📕 Cheque Book Delivery</h3><select id=chequeLeaves><option value=50>10 leaves - Rs 50</option><option value=90>25 leaves - Rs 90</option><option value=150>50 leaves - Rs 150</option></select><select id=chequeDelivery><option value=0>Branch pickup - Rs 0</option><option value=40>Registered address - Rs 40</option><option value=80>Express courier - Rs 80</option></select><textarea id=chequeAddr class=input placeholder="Delivery address / pickup branch"></textarea><button id=orderCheque class=btn>Order Cheque Book</button><div id=chequeMsg class=status>No cheque book order.</div></div><div class=tile><h3>📘 Passbook Delivery</h3><select id=passbookType><option value=0>Update existing passbook - Rs 0</option><option value=60>New passbook - Rs 60</option><option value=100>Duplicate passbook - Rs 100</option></select><select id=passbookDelivery><option value=0>Branch pickup - Rs 0</option><option value=40>Registered address - Rs 40</option></select><textarea id=passbookAddr class=input placeholder="Delivery address / pickup branch"></textarea><button id=orderPassbook class=btn>Order Passbook Service</button><div id=passbookMsg class=status>No passbook order.</div></div><div class=tile><h3>🧾 Paper Statement Delivery</h3><select id=stmtPeriod><option value=20>Last 1 month - Rs 20</option><option value=40>Last 3 months - Rs 40</option><option value=70>Last 6 months - Rs 70</option><option value=120>Current financial year - Rs 120</option></select><select id=stmtDelivery><option value=0>Branch pickup - Rs 0</option><option value=40>Registered address - Rs 40</option><option value=80>Express courier - Rs 80</option></select><textarea id=stmtAddr class=input placeholder="Delivery address / pickup branch"></textarea><button id=orderStmt class=btn>Order Paper Statement</button><div id=stmtMsg class=status>No paper statement order.</div></div></div></section>'}
function limits(){return '<section id=limits class="page card hidden"><h2>📊 Limits</h2><div class=grid><div class=tile><p>UPI: Rs 2,000/day</p><p>Bank Transfer: Rs 5,000/day</p><p>Card: Rs 1,000/day</p></div><div class=tile><select id=limType><option>UPI Limit</option><option>Bank Transfer Limit</option><option>Card Limit</option></select><input id=limAmt class=input type=number placeholder="Requested amount"><button id=limReq class=btn>Submit Limit Change</button><div id=limMsg class=status>No limit change.</div></div></div></section>'}function history(){return '<section id=history class="page card hidden"><h2>📜 History</h2><input id=search class=input placeholder=Search><div class=tableWrap><table id=hist class=tbl></table></div></section>'}function identity(){return '<section id=identity class="page card hidden"><h2>🪪 Identity</h2><input id=kycRef class=input placeholder="Reference number"><select id=kycDoc><option>School Identity Card</option><option>Aadhaar Card</option></select><input id=kycNo class=input placeholder="Document number"><input id=kycName class=input placeholder="Name"><input id=kycFile class=input type=file><button id=kycSend class=btn>Submit e-KYC</button><div id=kycMsg class=status>Awaiting details.</div></section>'}function approvalsPage(){return '<section id=approvals class="page card hidden"><h2>📨 Payment Approvals</h2><div class=help>Accept or decline pending payment approvals. Accepted/declined decisions are saved in history.</div><div id=reqs></div></section>'}function more(){return '<section id=more class="page card hidden"><h2>⚙️ More</h2><div class=grid><div class=tile><h3>📱 iPad Device Settings</h3><p>Trusted device: Galaxy / iPad payment profile</p><button id=trustDevice class="btn sec">Refresh Trusted Device</button><button id=qrPerm class="btn sec">Enable iPad QRscan</button><div id=deviceMsg class=status>Device permissions ready.</div></div><div class=tile><h3>👥 Beneficiaries</h3><input id=benName class=input placeholder="Beneficiary nickname"><input id=benUpi class=input placeholder="UPI ID / Account reference"><button id=saveBen class=btn>Save Beneficiary</button><div id=benMsg class=status>No beneficiary saved yet.</div></div><div class=tile><h3>🔎 Security Audit</h3><button id=auditBtn class="btn sec">Generate Audit Log</button><div id=auditMsg class=status>Audit log not generated.</div></div><div class=tile><h3>📞 Contact Preferences</h3><input id=mailNew class=input placeholder="Update email"><input id=mobNew class=input placeholder="Update mobile"><button id=contactUpdate class=btn>Update Contact</button><div id=contactMsg class=status>No contact update.</div></div></div></section>'}
function globalClick(e){var g=e.target.closest('[data-go]');if(g)show(g.dataset.go);if(e.target.id==='logout')location.reload();if(e.target.id==='ok'||e.target.id==='cc')close();var ac=e.target.closest('[data-accept]');if(ac)approval(+ac.dataset.accept,'Accepted');var de=e.target.closest('[data-decline]');if(de)approval(+de.dataset.decline,'Declined')}
function bind(){on('mobileSel','change',function(e){show(e.target.value)});on('upiPay','click',function(){var u=$('upiId').value.trim();if(!u.includes('@'))return msg('UPI ID must contain @.');pay('UPI Receiver',$('upiName').value||u,+$('upiAmt').value,'UPI',{UPI:u})});on('bankPay','click',function(){if($('acc1').value!==$('acc2').value)return msg('Account numbers do not match.');pay($('ben').value,$('bankName').value,+$('bankAmt').value,'Bank Transfer',{Bank:$('bankName').value,Account:$('acc1').value})});on('merPay','click',function(){pay($('mer').value,$('merUpi').value,+$('merAmt').value,'Merchant',{UPI:$('merUpi').value})});on('metroPay','click',function(){pay('Metro Ticket',$('from').value+' to '+$('to').value,+$('metroAmt').value,'Metro',{From:$('from').value,To:$('to').value,Info:'Scan this QR Code at the Enterance and Exit Gates'},true)});on('mobPay','click',function(){pay('Mobile Recharge',$('carrier').value,+$('plan').value,'Recharge',{Carrier:$('carrier').value,Mobile:$('mobNo').value,Plan:money($('plan').value)})});on('rbPay','click',function(){if(!$('rbUser').value)return msg('Enter Roblox username.');pay('Robux Purchase','Roblox Store',+$('pack').value,'Robux',{RobloxUsername:$('rbUser').value,Pack:$('pack').selectedOptions[0].text})});on('newCard','click',function(){secure('Order New Card',$('cardNet').value,function(){cardRequested=true;cardStage=0;addTx('Card Services','New debit card ordered','Card','-','Ordered',{Network:$('cardNet').value,Delivery:$('cardDelivery').value});$('cardMsg').innerHTML='<b class=ok>New card ordered successfully.</b>';receipt('New Card Ordered','Card Services','-',{Network:$('cardNet').value,Status:'Ordered'});render()})});on('blockCard','click',function(){secure('Block Card','Card will be blocked immediately.',function(){cardBlocked=true;addTx('Card Services','Debit card blocked','Card','-','Successful',{});renderCard();receipt('Card Blocked Successfully','Card Services','-',{Status:'Blocked'})})});on('unblockCard','click',function(){secure('Unblock Card','Card will be active immediately.',function(){cardBlocked=false;addTx('Card Services','Debit card unblocked','Card','-','Successful',{});renderCard();receipt('Card Unblocked Successfully','Card Services','-',{Status:'Active'})})});on('activateCard','click',activateCard);on('trackCard','click',trackCard);on('trackCard2','click',trackCard);on('orderCheque','click',function(){deliveryPaid('Cheque Book',$('chequeLeaves'),$('chequeDelivery'),$('chequeAddr'),'chequeMsg')});on('orderPassbook','click',function(){deliveryPaid('Passbook',$('passbookType'),$('passbookDelivery'),$('passbookAddr'),'passbookMsg')});on('orderStmt','click',function(){deliveryPaid('Paper Statement',$('stmtPeriod'),$('stmtDelivery'),$('stmtAddr'),'stmtMsg')});on('cardReissue','click',function(){paidService('Card Services','Debit Card Reissue',150,'cardReissueMsg',{Timeline:'Ordered → Dispatched → Out For Delivery → Delivered → Activated'})});on('limReq','click',function(){if(!$('limAmt').value)return msg('Enter amount.');secure('Limit Change',$('limType').value,function(){addTx('Limit Desk',$('limType').value,'Limits','-','Pending Approval',{Requested:money($('limAmt').value)});$('limMsg').innerHTML='<b class=ok>Limit change submitted.</b>';receipt('Limit Change Submitted','Limit Desk','-',{Type:$('limType').value,Requested:money($('limAmt').value)})})});on('search','input',renderTx);on('kycSend','click',function(){if(!$('kycRef').value||!$('kycNo').value||!$('kycName').value||!$('kycFile').value)return msg('Fill all e-KYC fields.');addTx('Identity Centre','e-KYC submitted','Identity','-','Under Review',{});$('kycMsg').innerHTML='<b class=ok>e-KYC submitted for review.</b>'});on('trustDevice','click',function(){secure('Refresh Trusted Device','Device profile will be refreshed immediately.',function(){addTx('Device Centre','Trusted device refreshed','Device','-','Successful',{Device:'iPad payment profile'});$('deviceMsg').innerHTML='<b class=ok>Trusted device refreshed.</b>';receipt('Device Refreshed','Device Centre','-',{Status:'Successful'})})});on('qrPerm','click',function(){secure('Enable iPad QRscan','QRscan payment permission will be enabled immediately.',function(){addTx('Device Centre','iPad QRscan enabled','Device','-','Successful',{Permission:'QRscan payments'});$('deviceMsg').innerHTML='<b class=ok>iPad QRscan enabled.</b>';receipt('QRscan Enabled','Device Centre','-',{Permission:'Active'})})});on('saveBen','click',function(){if(!$('benName').value||!$('benUpi').value)return msg('Enter beneficiary name and reference.');secure('Save Beneficiary',$('benName').value,function(){addTx('Beneficiary Centre','Beneficiary saved','Beneficiary','-','Successful',{Name:$('benName').value,Reference:$('benUpi').value});$('benMsg').innerHTML='<b class=ok>Beneficiary saved.</b><br>'+$('benName').value;receipt('Beneficiary Saved','Beneficiary Centre','-',{Name:$('benName').value,Reference:$('benUpi').value})})});on('auditBtn','click',function(){addTx('Security Audit','Audit log generated','Security','-','Successful',{Login:'Successful',Device:'Trusted',PIN:'Verified'});$('auditMsg').innerHTML='<b class=ok>Audit generated.</b><br>Login successful • Device trusted • PIN verified';renderTx()});on('contactUpdate','click',function(){if(!$('mailNew').value&&!$('mobNew').value)return msg('Enter email or mobile.');secure('Update Contact','Contact details will be updated.',function(){addTx('Profile Centre','Contact details updated','Profile','-','Successful',{Email:$('mailNew').value||'No change',Mobile:$('mobNew').value||'No change'});$('contactMsg').innerHTML='<b class=ok>Contact details updated.</b>';receipt('Contact Updated','Profile Centre','-',{Email:$('mailNew').value||'No change',Mobile:$('mobNew').value||'No change'})})})}
function show(id){all('.page').forEach(function(p){p.classList.add('hidden')});if($(id))$(id).classList.remove('hidden');all('#nav button').forEach(function(b){b.classList.toggle('on',b.dataset.go===id)});if($('mobileSel'))$('mobileSel').value=id}
function secure(title,detail,ok){modal('<h2>🔐 '+title+'</h2><div class=help>'+detail+'<br>Enter Payments PIN.</div><div id=pd class=dots>----</div><input id=pp class=hidden readonly><div id=ppad class=pinpad></div><button id=confirmPin class=btn>Confirm</button><button id=cc class="btn sec">Cancel</button>');makePad('ppad','pp','pd');$('confirmPin').onclick=function(){if($('pp').value!==PIN)return msg('Incorrect Payments PIN.');loading(ok)}}function loading(done){modal('<h2>Processing</h2><div class=spinner></div><div id=prog class=status>Connecting to secure server...</div>');var a=['Validating PIN...','Checking balance and limits...','Creating reference...','Finalising...'],i=0;var t=setInterval(function(){if(i<a.length)$('prog').textContent=a[i++];else{clearInterval(t);done()}},300)}
function pay(party,desc,amt,type,extra,showQr){if(!party||!desc||!amt||amt<=0)return msg('Fill required details.');if(amt>bal){addTx(party,desc,type,money(amt),'Failed',Object.assign({Reason:'Insufficient Balance'},extra||{}));receipt('Payment Failed',party,money(amt),Object.assign({Reason:'Insufficient Balance'},extra||{}));render();return}secure('Confirm '+type,party+' • '+money(amt),function(){bal-=amt;addTx(party,desc,type,money(amt),'Successful',extra||{});receipt(type+' Successful',party,money(amt),extra||{},showQr);render()})}
function receipt(title,party,amt,extra,showQr){var rows={TransactionID:tid(),Date:new Date().toLocaleString('en-IN'),Party:party,Amount:amt};Object.assign(rows,extra||{});var html='<h2>'+title+'</h2>';if(showQr)html+=qr()+'<p class=ok style="text-align:center">Scan this QR Code at the Enterance and Exit Gates</p>';for(var k in rows)html+='<div class=receiptLine><b>'+k+'</b><span>'+rows[k]+'</span></div>';html+='<button id=ok class=btn>Done</button>';modal(html)}function addTx(p,d,t,a,s,e){tx.unshift({id:tid(),date:new Date().toLocaleString('en-IN'),party:p,desc:d,type:t,amount:a,status:s,balance:money(bal),extra:e||{}})}
function render(){if($('balTop'))$('balTop').textContent=money(bal);if($('balDash'))$('balDash').textContent=money(bal);renderTx();renderApprovals();renderCard();bind()}function renderCard(){var el=$('cardVisual');if(!el)return;el.innerHTML='<h3>Active Debit Card</h3><div class="fakecard '+(cardBlocked?'blocked':'')+'"><div style="font-size:22px;font-weight:1000">PLUXEE BANK</div><p>**** **** **** 2017</p><h3>AARNAV</h3><p>RuPay Debit • '+(cardBlocked?'BLOCKED':'ACTIVE')+'</p></div>'+(cardBlocked?'<p class=bad>Card is blocked.</p>':'<p class=ok>Card is active.</p>')}function renderTx(){var s=($('search')&&$('search').value||'').toLowerCase();var head='<tr><th>Date</th><th>Trans ID</th><th>Party</th><th>Description</th><th>Type</th><th>Amount</th><th>Status</th><th>Balance</th><th>Details</th></tr>';var rows=tx.filter(function(x){return JSON.stringify(x).toLowerCase().includes(s)}).map(function(x){return '<tr><td>'+x.date+'</td><td>'+x.id+'</td><td>'+x.party+'</td><td>'+x.desc+'</td><td>'+x.type+'</td><td>'+x.amount+'</td><td>'+x.status+'</td><td>'+x.balance+'</td><td>'+Object.entries(x.extra).map(function(kv){return kv[0]+': '+kv[1]}).join('<br>')+'</td></tr>'}).join('');if($('hist'))$('hist').innerHTML=head+rows;if($('dashTbl'))$('dashTbl').innerHTML=head+rows.slice(0,800)}function renderApprovals(){if(!$('reqs'))return;$('reqs').innerHTML=approvals.map(function(r,i){return '<div class=status><b>'+r[0]+'</b><br>'+r[1]+'<br><button class=btn data-accept="'+i+'">Accept</button><button class="btn sec" data-decline="'+i+'">Decline</button></div>'}).join('')}function approval(i,decision){var r=approvals[i];if(!r)return;secure(decision+' Approval',r[0],function(){addTx('Approval Centre',r[0],'Approval','-',decision,{Decision:decision});receipt('Approval '+decision,'Approval Centre','-',{Item:r[0],Status:decision})})}
function activateCard(){modal('<h2>Activate New Card</h2><input id=actCard class=input inputmode=numeric maxlength=19 placeholder="Full card number"><select id=actNet class=input><option>RuPay</option><option>Visa</option><option>Mastercard</option><option>Discover</option></select><input id=actExp class=input placeholder="Expiry MM/YY"><input id=actName class=input placeholder="Name on card"><button id=sendActOtp class=btn>Send Email / Mobile OTP</button><div id=actOtpBox class=hidden><input id=actOtp class=input inputmode=numeric maxlength=6 placeholder="Enter 6 digit OTP"><button id=finishAct class=btn>Activate Card</button></div><div id=actMsg class=status>OTP not sent yet.</div><button id=cc class="btn sec">Close</button>');$('sendActOtp').onclick=function(){var c=$('actCard').value.split(' ').join('');var ok=c.length>=12&&c.length<=19;for(var i=0;i<c.length;i++){if(c[i]<'0'||c[i]>'9')ok=false}if(!ok)return msg('Enter a valid card number.');if(!$('actExp').value||!$('actName').value)return msg('Enter expiry and name.');showEl('actOtpBox');$('actMsg').innerHTML='<b>OTP sent</b> to linked mobile/email.'};$('finishAct').onclick=function(){var o=$('actOtp').value;var ok=o.length===6;for(var j=0;j<o.length;j++){if(o[j]<'0'||o[j]>'9')ok=false}if(!ok)return msg('Enter any 6 digit OTP.');loading(function(){cardBlocked=false;cardRequested=true;cardStage=4;addTx('Card Services','New debit card activated','Card','-','Successful',{Network:$('actNet').value,Last4:$('actCard').value.slice(-4)});renderCard();receipt('Card Activated Successfully','Card Services','-',{Network:$('actNet').value,Last4:$('actCard').value.slice(-4),Status:'Activated'})})}}
function trackCard(){if(!cardRequested)return msg('No new card order found. Order or activate a card first.');var stages=['Ordered','Dispatched','Out For Delivery','Delivered','Activated'];var html='<h2>Card Delivery Process</h2>';stages.forEach(function(s,i){html+='<div class="status stage '+(i<=cardStage?'done':'')+'"><b>'+(i<=cardStage?'✓':i+1)+'</b><span>'+s+(i===cardStage?' <span class=ok>Current</span>':'')+'</span></div>'});html+='<button id=advanceCard class=btn>Update Delivery Status</button><button id=cc class="btn sec">Close</button>';modal(html);$('advanceCard').onclick=function(){if(cardStage<stages.length-1)cardStage++;trackCard()}}function paidService(party,name,fee,msgId,extra){if(fee>bal){addTx(party,name,'Service',money(fee),'Failed',{Reason:'Insufficient Balance'});receipt('Service Failed',party,money(fee),{Service:name,Reason:'Insufficient Balance'});render();return}secure(name,'Charge: '+money(fee)+'. This will be deducted from available balance.',function(){bal-=fee;addTx(party,name,'Service',money(fee),'Processing',Object.assign({Charge:money(fee),Status:'Processing'},extra||{}));if($(msgId))$(msgId).innerHTML='<b class=ok>'+name+' ordered.</b><br>Charge deducted: '+money(fee)+'<br>Status: Processing';receipt(name+' Ordered',party,money(fee),Object.assign({Status:'Processing'},extra||{}));render()})}
function deliveryPaid(type,optEl,delEl,addrEl,msgId){var fee=Number(optEl.value)+Number(delEl.value);var opt=optEl.options[optEl.selectedIndex].text;var del=delEl.options[delEl.selectedIndex].text;var addr=addrEl.value.trim();if(!addr)return msg('Enter delivery address or pickup branch.');if(fee>bal){addTx('Delivery Desk',type+' ordered',type,money(fee),'Failed',{Reason:'Insufficient Balance',Option:opt,Delivery:del});receipt('Delivery Order Failed','Delivery Desk',money(fee),{Service:type,Reason:'Insufficient Balance'});render();return}secure(type+' Order','Charge: '+money(fee)+' for '+opt+' + '+del,function(){bal-=fee;addTx('Delivery Desk',type+' ordered',type,money(fee),'Processing',{Option:opt,Delivery:del,Address:addr,Timeline:'Ordered → Dispatched → Out For Delivery → Delivered'});$(msgId).innerHTML='<b class=ok>'+type+' ordered.</b><br>Charge deducted: '+money(fee)+'<br>Status: Ordered → Dispatched → Out For Delivery → Delivered';receipt(type+' Ordered','Delivery Desk',money(fee),{Option:opt,Delivery:del,Status:'Processing'});render()})}
function preTrack(){var r=$('preRef').value.trim();if(!r)return msg('Enter reference number.');modal('<h2>Reference Verification</h2><p>Reference '+r+' requires verification.</p><input id=preNo class=input placeholder="Document number"><input id=preName class=input placeholder="Name"><input id=preFile class=input type=file><button id=sendPre class=btn>Send OTP</button><div id=preOtpBox class=hidden><input id=preOtp class=input placeholder="Enter OTP"><button id=verifyPre class=btn>Verify</button></div><div id=preKycMsg class=status>Fill all fields.</div><button id=cc class="btn sec">Close</button>');$('sendPre').onclick=function(){if(!$('preNo').value||!$('preName').value||!$('preFile').value)return msg('Fill all fields.');showEl('preOtpBox');$('preKycMsg').textContent='OTP sent.'};$('verifyPre').onclick=function(){if(!$('preOtp').value)return msg('Enter OTP.');$('preKycMsg').innerHTML='<b class=ok>Verification submitted.</b>'}}
var acctHtml={Applicant:'<div class=card><input id=afn class=input placeholder="Full Name"><input id=adob class=input type=date><input id=amob class=input placeholder=Mobile></div>',Identity:'<div class=card><select id=aid><option>School Identity Card</option><option>Aadhaar Card</option></select><input id=aidno class=input placeholder="ID Number"><input id=aidfile class=input type=file></div>',Banking:'<div class=card><input id=aupi class=input placeholder="Preferred UPI ID"><input id=newUser class=input placeholder="Internet banking username"><input id=newPin class=input maxlength=4 placeholder="4 digit Payments PIN"></div>',Cards:'<div class=card><label><input type=checkbox checked> Debit card required</label><br><label><input type=checkbox> Cheque book required</label><select><option>10 leaves</option><option>25 leaves</option></select></div>',iPad:'<div class=card><input class=input placeholder="iPad Serial Number"><label><input type=checkbox checked> iPad-QRscan payments</label></div>',Submit:'<div class=card><label><input id=dec type=checkbox> Details are correct</label><textarea id=sign class=input placeholder="Signature / name"></textarea></div>'};function drawAcct(){$('acctBody').innerHTML='<div class=card><h2>'+(sec+1)+'. '+sections[sec]+'</h2>'+acctHtml[sections[sec]]+'</div>';$('prev').classList.toggle('hidden',sec===0);$('next').classList.toggle('hidden',sec===sections.length-1);$('submit').classList.toggle('hidden',sec!==sections.length-1)}function verify(done){$('acctMsg').innerHTML='<div class=spinner></div><b>Verifying section...</b>';setTimeout(function(){var s=sections[sec];if(s==='Applicant'&&(!$('afn').value||!$('adob').value||!$('amob').value))return $('acctMsg').innerHTML='<b class=bad>Fill name, DOB and mobile.</b>';if(s==='Identity'&&(!$('aidno').value||!$('aidfile').value))return $('acctMsg').innerHTML='<b class=bad>Fill and upload ID proof.</b>';if(s==='Banking'&&($('aupi').value&&!$('aupi').value.includes('@')))return $('acctMsg').innerHTML='<b class=bad>UPI ID must contain @.</b>';if(s==='Submit'&&(!$('dec').checked||!$('sign').value))return $('acctMsg').innerHTML='<b class=bad>Accept declaration and sign.</b>';$('acctMsg').innerHTML='<b class=ok>'+s+' verified.</b>';done()},500)}
init();})();
</script></body></html>
